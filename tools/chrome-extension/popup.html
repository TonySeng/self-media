<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; font-size: 13px; color: #1a1a1a; }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .section { margin-bottom: 14px; }
    label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; }
    input { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
    input:focus { outline: none; border-color: #3b82f6; }
    button { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-secondary { background: #f3f4f6; color: #374151; margin-top: 6px; }
    .btn-secondary:hover { background: #e5e7eb; }
    .status { margin-top: 10px; padding: 8px; border-radius: 4px; font-size: 12px; display: none; }
    .status.success { display: block; background: #dcfce7; color: #166534; }
    .status.error { display: block; background: #fef2f2; color: #991b1b; }
    .status.info { display: block; background: #eff6ff; color: #1e40af; }
    .settings { border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
    .small { font-size: 11px; color: #999; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>抖音账号同步</h1>

  <div id="login-section">
    <div class="section">
      <label>Self-Media 管理密码</label>
      <input type="password" id="password" placeholder="输入管理密码以连接">
    </div>
    <button class="btn-primary" id="btn-login">连接</button>
  </div>

  <div id="main-section" style="display:none">
    <div class="section">
      <label>检测到的账号</label>
      <div id="detected-info" class="small">检测中...</div>
    </div>
    <div id="manual-secuid-section" style="display:none" class="section">
      <label>手动输入 sec_uid（自动检测失败）</label>
      <input type="text" id="manual-secuid" placeholder="MS4wLjAB...">
      <p class="small">在 douyin.com/user/self 按 F12 → Network，刷新后找 /aweme/post/ 请求，复制 URL 里的 sec_user_id</p>
    </div>
    <button class="btn-primary" id="btn-sync">一键同步到 Self-Media</button>
    <button class="btn-secondary" id="btn-logout">断开连接</button>
  </div>

  <div id="status" class="status"></div>

  <div class="settings">
    <label>Self-Media 地址</label>
    <input type="text" id="server-url" placeholder="http://localhost:3000">
    <p class="small">默认 http://localhost:3000，修改后自动保存</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
