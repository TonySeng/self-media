services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: self-media-web:local
    container_name: self-media-web
    restart: unless-stopped
    # 容器无 IPv6 出口，但抖音域名是 IPv4/IPv6 双栈，默认优先 IPv6 会导致
    # ENETUNREACH / ERR_ADDRESS_UNREACHABLE（影响对标账号导入、浏览器签名器）。
    # 关掉容器内 IPv6，强制所有出网走 IPv4。
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/self_media?schema=public
      NODE_ENV: production
      LOCAL_STORAGE_PATH: /data/uploads
    ports:
      - '3000:3000'
    volumes:
      - self_media_uploads:/data/uploads
    networks:
      - default

networks:
  default:
    name: self-media_default
    external: true

volumes:
  self_media_uploads:
