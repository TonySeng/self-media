services:
  db:
    image: postgres:16-alpine
    container_name: self-media-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: self_media
    ports:
      - '5432:5432'
    volumes:
      - self_media_db:/var/lib/postgresql/data

volumes:
  self_media_db:
